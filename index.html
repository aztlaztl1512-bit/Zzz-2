<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي اليوم - أ/ عبدالعزيز الفيفي</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a237e; --secondary: #311b92; --bg: #f8f9fa; --accent: #f57c00; --correct: #1b5e20; --wrong: #b71c1c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); width: 95%; max-width: 700px; text-align: center; position: relative; border-top: 8px solid var(--primary); }
        #timer-bar { position: absolute; top: 0; right: 0; height: 8px; background: var(--accent); width: 100%; transition: width 1s linear; border-radius: 20px 20px 0 0; }
        .option-btn { display: block; width: 100%; padding: 14px; margin: 12px 0; border: 2px solid #e0e0e0; border-radius: 10px; background: #fff; cursor: pointer; transition: all 0.3s ease; font-size: 1.15rem; font-weight: 500; color: #333; }
        .option-btn:hover { border-color: var(--secondary); background-color: #f3e5f5; }
        .correct-flash { background-color: #e8f5e9 !important; border-color: var(--correct) !important; color: var(--correct); border-width: 3px !important; box-shadow: 0 0 10px rgba(27,94,32,0.2); }
        .wrong-flash { background-color: #ffebee !important; border-color: var(--wrong) !important; color: var(--wrong); }
        .hidden { display: none; }
        .reading-text { background: #fffde7; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: right; font-size: 1.05rem; border-right: 6px solid var(--accent); line-height: 1.8; color: #444; }
        input[type="text"] { width: 85%; padding: 15px; margin-bottom: 25px; border-radius: 10px; border: 2px solid #ddd; font-size: 1.1rem; text-align: center; outline: none; }
        .btn-start { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 15px 40px; border: none; border-radius: 12px; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        #feedback { margin-top: 20px; font-weight: bold; font-size: 1.2rem; min-height: 1.6em; }
        #timer-text { font-weight: bold; color: var(--wrong); margin-bottom: 15px; font-size: 1.1rem; }
        .copyright { font-size: 0.9rem; color: #777; margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; }
        .normal-text { color: #555; font-weight: normal; }
        .date-badge { background: #eee; color: var(--wrong); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; margin-bottom: 15px; display: inline-block; }
    </style>
</head>
<body onload="updateDateTime()">

<div class="quiz-container">
    <div id="timer-bar"></div>
    
    <div id="login-section">
        <h1 style="color: var(--primary); margin-bottom: 10px;">التحدي رقم ( 38 )</h1>
        <div id="date-display" class="date-badge">جاري التحميل...</div>
        <div class="reading-text" style="text-align: center; border: none; background: #e8eaf6;">
            "ليس هناك تحدٍ أكبر من تطوير ذاتك"
        </div>
        <input type="text" id="student-name" placeholder="أدخل اسمك الثلاثي للمنافسة...">
        <br>
        <button class="btn-start" onclick="startQuiz()">ابدأ تحدي النخبة 🚀</button>
        <div class="copyright">أ/ <span class="normal-text">عبدالعزيز الفيفي</span> - <span class="normal-text">ثانوية الأمير عبدالمجيد 🎓</span></div>
    </div>

    <div id="quiz-section" class="hidden">
        <div id="timer-text">⏳ المتبقي: 40 ثانية</div>
        <h3 id="question-title" style="color: var(--secondary); margin-bottom: 10px; font-size: 1.3rem;"></h3>
        <div id="reading-container" class="reading-text hidden"></div>
        <h2 id="question-text" style="margin: 15px 0; color: #222;"></h2>
        <div id="options-container"></div>
        <div id="feedback"></div>
        <div class="copyright">أ/ <span class="normal-text">عبدالعزيز الفيفي</span> - <span class="normal-text">ثانوية الأمير عبدالمجيد 🎓</span></div>
    </div>

    <div id="result-section" class="hidden">
        <h2 style="color: var(--primary);">انتهى سباق التميز!</h2>
        <h1 id="final-score" style="font-size: 3rem; color: var(--accent); margin: 20px 0;"></h1>
        <button class="btn-start" onclick="location.reload()">أعد الكرة.. كُن النسخة الأفضل 🔄</button>
        <p class="copyright">بإشراف أ/ <span class="normal-text">عبدالعزيز الفيفي</span> - <span class="normal-text">ثانوية الأمير عبدالمجيد 🎓</span></p>
    </div>
</div>

<script>
    function updateDateTime() {
        const today = new Date();
        const hijriOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', calendar: 'islamic-umalqura', numberingSystem: 'arabic' };
        const gregOptions = { day: 'numeric', month: 'long', year: 'numeric', numberingSystem: 'arabic' };
        document.getElementById('date-display').innerText = `${new Intl.DateTimeFormat('ar-SA', hijriOptions).format(today)} | ${new Intl.DateTimeFormat('ar-SA', gregOptions).format(today)} م`;
    }

    let timeLeft = 40, timerInterval, currentQ = 0, score = 0;
    const rawData = [
    // --- التناظر اللفظي ---
    { type: "التناظر اللفظي", q: "عطش : ماء", options: ["نوم : راحة", "جوع : طعام", "مرض : دواء", "برد : دثار"], correctText: "جوع : طعام" },
    { type: "التناظر اللفظي", q: "ريش : طائر", options: ["صوف : خروف", "وبر : جمل", "جلد : ثعبان", "شعر : ماعز"], correctText: "صوف : خروف" },
    { type: "التناظر اللفظي", q: "محراب : مسجد", options: ["منبر : خطيب", "مئذنة : أذان", "مكتبة : مدرسة", "غرفة : منزل"], correctText: "غرفة : منزل" },
    { type: "التناظر اللفظي", q: "نوم : ليل", options: ["صوم : رمضان", "دراسة : مدرسة", "عمل : نهار", "راحة : تعب"], correctText: "عمل : نهار" },

    // --- إكمال الجمل ---
    { type: "إكمال الجمل", q: "من أراد أن ينصف الناس من نفسه، فليحب لهم ما ..... لنفسه", options: ["يتمنى", "يريد", "يحب", "يرجو"], correctText: "يحب" },
    { type: "إكمال الجمل", q: "الصمت في المواقف الصعبة يعتبر .....، بينما الكلام في غير موضعه يعتبر .....", options: ["حكمة - حماقة", "وقاراً - شجاعة", "قوة - ضعفاً", "ذكاء - دهاء"], correctText: "حكمة - حماقة" },
    { type: "إكمال الجمل", q: "العلم كـ .....، إذا لم يزدد فإنه .....", options: ["النهر - يجف", "البحر - ينقص", "الزينة - يبهت", "المال - يقل"], correctText: "البحر - ينقص" },
    { type: "إكمال الجمل", q: "لا تجعل من عثرات الماضي ..... لخطواتك، بل اجعلها ..... لنجاحك", options: ["قيوداً - حافزاً", "ستراً - عائقاً", "ظلاً - نوراً", "ذكرى - واقعاً"], correctText: "قيوداً - حافزاً" },

    // --- المفردة الشاذة ---
    { type: "المفردة الشاذة", q: "ما الكلمة المختلفة؟", options: ["الحديد", "النحاس", "الفضة", "الخشب"], correctText: "الخشب" },
    { type: "المفردة الشاذة", q: "ما الكلمة المختلفة؟", options: ["مكة", "المدينة", "جدة", "القاهرة"], correctText: "القاهرة" },
    { type: "المفردة الشاذة", q: "ما الكلمة المختلفة؟", options: ["المربع", "المستطيل", "الدائرة", "المعين"], correctText: "الدائرة" },
    { type: "المفردة الشاذة", q: "ما الكلمة المختلفة؟", options: ["الأسد", "النمر", "الفهد", "الخروف"], correctText: "الخروف" },

    // --- الخطأ في السياق ---
    { type: "الخطأ في السياق", q: "من كثر ضحكه قلت هيبته، ومن كثر مزاحه احترمه الناس", options: ["ضحكه", "قلت", "مزاحه", "احترمه"], correctText: "احترمه" },
    { type: "الخطأ في السياق", q: "الاعتراف بالخطأ فضيلة، والمكابرة فيه تزيد من مكانة المرء", options: ["الاعتراف", "فضيلة", "المكابرة", "تزيد"], correctText: "تزيد" },
    { type: "الخطأ في السياق", q: "الناجح يبحث عن حل في كل مشكلة، أما المتشائم فيبحث عن حل في كل فرصة", options: ["الناجح", "حل", "مشكلة", "فرصة"], correctText: "حل" },
    { type: "الخطأ في السياق", q: "التواضع يرفع صاحبه، والتكبر يخفض مكانة المرء ويرفع قدره", options: ["يرفع", "التكبر", "يخفض", "يرفع"], correctText: "يرفع" },

    // --- استيعاب المقروء ---
    { 
        type: "استيعاب المقروء", 
        text: "تعتبر المياه العذبة ضرورة للحياة، ولكنها تمثل نسبة ضئيلة جداً من إجمالي المياه على كوكب الأرض، حيث يتركز معظمها في الجبال الجليدية.",
        q: "يتركز معظم المياه العذبة على الأرض في:", 
        options: ["الجبال الجليدية", "البحار والمحيطات", "الأنهار والبحيرات", "المياه الجوفية"], 
        correctText: "الجبال الجليدية" 
    },
    { 
        type: "استيعاب المقروء", 
        text: "التمثيل الضوئي هو عملية تقوم بها النباتات لتحويل ضوء الشمس إلى طاقة كيميائية، وهي الأساس الذي تعتمد عليه السلاسل الغذائية.",
        q: "الهدف الرئيسي من عملية التمثيل الضوئي هو:", 
        options: ["تحويل الضوء لطاقة", "إنتاج الأكسجين فقط", "امتصاص الماء", "تزيين الطبيعة"], 
        correctText: "تحويل الضوء لطاقة" 
    },
    { 
        type: "استيعاب المقروء", 
        text: "تعد اللغة العربية من أكثر اللغات انتشاراً، وتتميز بقدرتها الفائقة على الاشتقاق وتوليد مصطلحات جديدة تواكب العصر.",
        q: "تتميز اللغة العربية حسب النص بـ:", 
        options: ["القدرة على الاشتقاق", "سهولة النطق", "كثرة المتحدثين", "جمال الخط"], 
        correctText: "القدرة على الاشتقاق" 
    },
    { 
        type: "استيعاب المقروء", 
        text: "تعتبر الرياضة الصباحية من أفضل الوسائل لتنشيط الدورة الدموية وزيادة التركيز الذهني طوال اليوم.",
        q: "الفائدة الذهنية المذكورة للرياضة الصباحية هي:", 
        options: ["زيادة التركيز", "تنشيط الجسم", "تقليل الوزن", "تحسين النوم"], 
        correctText: "زيادة التركيز" 
    }
];

    let quizData = [];
    function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

    function startQuiz() {
        if (!document.getElementById('student-name').value) { alert("لطفاً، ادخل اسمك الثلاثي"); return; }
        quizData = shuffle([...rawData]);
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[currentQ];
        document.getElementById('question-title').innerText = `س ${currentQ + 1} | ${q.type}`;
        const readingBox = document.getElementById('reading-container');
        if (q.text) { readingBox.innerText = q.text; readingBox.classList.remove('hidden'); } else { readingBox.classList.add('hidden'); }
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('feedback').innerText = '';
        shuffle([...q.options]).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt === q.correctText, q.correctText);
            container.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 40;
        updateTimerUI();
        timerInterval = setInterval(() => { timeLeft--; updateTimerUI(); if (timeLeft <= 0) { clearInterval(timerInterval); handleTimeout(); } }, 1000);
    }

    function updateTimerUI() {
        document.getElementById('timer-text').innerText = `⏳ المتبقي: ${timeLeft} ثانية`;
        document.getElementById('timer-bar').style.width = `${(timeLeft / 40) * 100}%`;
    }

    function checkAnswer(btn, isCorrect, correctText) {
        clearInterval(timerInterval);
        disableButtons();
        if (isCorrect) {
            score++;
            btn.classList.add('correct-flash');
            document.getElementById('feedback').innerHTML = "<span style='color:var(--correct)'>رائع! إجابة دقيقة يا بطل 🌟</span>";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            btn.classList.add('wrong-flash');
            highlightCorrect(correctText);
            document.getElementById('feedback').innerHTML = "<span style='color:var(--wrong)'>محاولة جيدة، الصواب موضح بالأخضر 💪</span>";
        }
        setTimeout(nextQuestion, 5000);
    }

    function handleTimeout() {
        disableButtons();
        highlightCorrect(quizData[currentQ].correctText);
        document.getElementById('feedback').innerHTML = "<span style='color:var(--accent)'>انتهى الوقت! ركز في السؤال القادم 🕒</span>";
        setTimeout(nextQuestion, 5000);
    }

    function highlightCorrect(text) {
        document.querySelectorAll('.option-btn').forEach(b => { if (b.innerText === text) b.classList.add('correct-flash'); });
    }

    function disableButtons() { document.querySelectorAll('.option-btn').forEach(b => b.disabled = true); }

    function nextQuestion() {
        currentQ++;
        if (currentQ < quizData.length) showQuestion(); else finishQuiz();
    }

    function finishQuiz() {
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
    }
</script>
</body>
</html>
